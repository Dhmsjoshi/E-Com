spring.application.name=api-gateway
server.port=9000


#Eureka client
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# --- Auth Service Routing ---
spring.cloud.gateway.routes[0].id=AuthService
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].uri=lb://AuthService

# --- Product Service Routing ---
spring.cloud.gateway.routes[1].id=productService
spring.cloud.gateway.routes[1].predicates[0]=Path=/products/**
spring.cloud.gateway.routes[1].uri=lb://productService
spring.cloud.gateway.routes[1].filters[0]=TokenRelay

# --- Cart Service Routing ---
spring.cloud.gateway.routes[2].id=cartService
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/cart/**
spring.cloud.gateway.routes[2].uri=lb://cartService
spring.cloud.gateway.routes[2].filters[0]=TokenRelay

# --- Order Service Routing ---
spring.cloud.gateway.routes[3].id=orderService
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/orders/**
spring.cloud.gateway.routes[3].uri=lb://orderService
spring.cloud.gateway.routes[3].filters[0]=TokenRelay

# --- Payment Service Routing ---
spring.cloud.gateway.routes[4].id=paymentService
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/payments/**
spring.cloud.gateway.routes[4].uri=lb://paymentService
spring.cloud.gateway.routes[4].filters[0]=TokenRelay


spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWK_SET_URI}
spring.security.oauth2.resourceserver.jwt.issuer-uri=   ${JWT_ISSUER}